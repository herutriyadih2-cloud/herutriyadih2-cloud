<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Animasi lingkaran luar berdenyut */
      .bg-circle {
        animation: pulse-border 2s infinite alternate ease-in-out;
      }
      
      /* Animasi huruf H menggambar sendiri */
      .h-letter {
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: draw-h 4s infinite alternate ease-in-out;
      }
      
      /* Animasi lingkaran dalam berputar */
      .inner-circle {
        transform-origin: 100px 100px;
        stroke-dasharray: 15 15;
        animation: spin 6s linear infinite;
      }

      @keyframes pulse-border {
        0% { stroke-width: 6px; stroke: #7e22ce; filter: drop-shadow(0 0 2px #7e22ce); }
        100% { stroke-width: 10px; stroke: #a855f7; filter: drop-shadow(0 0 15px #a855f7); }
      }
      
      @keyframes draw-h {
        0% { stroke-dashoffset: 400; }
        45%, 100% { stroke-dashoffset: 0; }
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </defs>

  <!-- Lingkaran Luar (Berdenyut) -->
  <circle cx="100" cy="100" r="90" fill="#0f172a" stroke="#7e22ce" stroke-width="8" class="bg-circle"/>
  
  <!-- Lingkaran Dalam (Berputar seperti radar) -->
  <circle cx="100" cy="100" r="66" fill="none" stroke="#c026d3" stroke-width="4" opacity="0.8" class="inner-circle"/>
  
  <!-- Huruf H (Menggambar diri) -->
  <path d="M58 48 L58 152 M142 48 L142 152 M58 100 L142 100" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" class="h-letter"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Heru Triyadi</title>
    <style>
        body {
            margin: 0;
            background-color: #0d1117; /* Warna gelap khas GitHub */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .banner-container {
            position: relative;
            width: 800px;
            height: 250px;
            background: rgba(20, 20, 30, 0.8);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
        }

        /* Efek Garis Cahaya Berputar (Cyberpunk border) */
        .banner-container::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, transparent, transparent, #00ffff, #8a2be2);
            animation: rotate 4s linear infinite;
        }

        .banner-container::after {
            content: '';
            position: absolute;
            inset: 4px; /* Ketebalan border */
            background: #0d1117;
            border-radius: 12px;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Konten Teks */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 0 0 20px rgba(138, 43, 226, 0.8);
            animation: pulse 2s infinite alternate;
        }

        p {
            color: #a3a3a3;
            font-size: 1.2rem;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .highlight {
            color: #00ffff;
        }

        @keyframes pulse {
            0% { opacity: 0.8; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
            100% { opacity: 1; text-shadow: 0 0 20px rgba(0, 255, 255, 1), 0 0 30px rgba(138, 43, 226, 0.8); }
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <div class="content">
            <h1>HERU TRIYADI</h1>
            <p>Frontend Developer <span class="highlight">|</span> Vue.js Enthusiast <span class="highlight">|</span> UI/UX</p>
        </div>
    </div>

</body>
</html>

<svg width="440" height="300" viewBox="0 0 440 300" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1226"/>
      <stop offset="100%" stop-color="#060312"/>
    </linearGradient>
    <radialGradient id="ambient" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.30"/>
      <stop offset="45%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
    <clipPath id="scr"><rect x="150" y="86" width="152" height="86" rx="4"/></clipPath>
  </defs>

  <!-- Panel -->
  <rect x="2" y="2" width="436" height="296" rx="16" fill="url(#panel)" stroke="#6366f1" stroke-opacity="0.35"/>
  <!-- Cahaya ambient -->
  <ellipse cx="226" cy="150" rx="200" ry="150" fill="url(#ambient)"/>

  <!-- Bintang kecil -->
  <g fill="#c4b5fd">
    <circle cx="60" cy="40" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="55" r="1.1" fill="#67e8f9"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="410" cy="120" r="1" fill="#a5b4fc"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="35" cy="110" r="1" fill="#67e8f9"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Simbol kode melayang naik -->
  <g font-size="14" font-weight="700">
    <text x="95" y="200" fill="#67e8f9">&lt;/&gt;<animate attributeName="opacity" values="0;0.9;0" dur="4s" repeatCount="indefinite" begin="0s"/><animate attributeName="y" values="205;120" dur="4s" repeatCount="indefinite" begin="0s"/></text>
    <text x="340" y="200" fill="#a855f7">{ }<animate attributeName="opacity" values="0;0.9;0" dur="4.6s" repeatCount="indefinite" begin="1.2s"/><animate attributeName="y" values="205;115" dur="4.6s" repeatCount="indefinite" begin="1.2s"/></text>
    <text x="120" y="200" fill="#8b5cf6">01<animate attributeName="opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite" begin="2.4s"/><animate attributeName="y" values="210;130" dur="5s" repeatCount="indefinite" begin="2.4s"/></text>
    <text x="320" y="200" fill="#22d3ee">( )<animate attributeName="opacity" values="0;0.85;0" dur="4.2s" repeatCount="indefinite" begin="3s"/><animate attributeName="y" values="208;125" dur="4.2s" repeatCount="indefinite" begin="3s"/></text>
  </g>

  <!-- ===== Monitor ===== -->
  <ellipse cx="226" cy="128" rx="120" ry="80" fill="url(#screenGlow)" filter="url(#soft)"/>
  <rect x="146" y="82" width="160" height="94" rx="7" fill="#0a1428" stroke="#22d3ee" stroke-opacity="0.7" stroke-width="1.5"/>
  <!-- Kode bergulir dalam layar -->
  <g clip-path="url(#scr)">
    <g>
      <g fill-opacity="0.9">
        <rect x="158" y="92"  width="44" height="4" rx="2" fill="#a855f7"/>
        <rect x="208" y="92"  width="60" height="4" rx="2" fill="#22d3ee"/>
        <rect x="166" y="104" width="70" height="4" rx="2" fill="#67e8f9"/>
        <rect x="166" y="116" width="40" height="4" rx="2" fill="#a5b4fc"/>
        <rect x="212" y="116" width="34" height="4" rx="2" fill="#8b5cf6"/>
        <rect x="158" y="128" width="52" height="4" rx="2" fill="#22d3ee"/>
        <rect x="174" y="140" width="80" height="4" rx="2" fill="#67e8f9"/>
        <rect x="166" y="152" width="36" height="4" rx="2" fill="#a855f7"/>
        <rect x="210" y="152" width="48" height="4" rx="2" fill="#a5b4fc"/>
        <rect x="158" y="164" width="64" height="4" rx="2" fill="#22d3ee"/>
        <!-- duplikat untuk gulir mulus -->
        <rect x="158" y="178" width="44" height="4" rx="2" fill="#a855f7"/>
        <rect x="208" y="178" width="60" height="4" rx="2" fill="#22d3ee"/>
        <rect x="166" y="190" width="70" height="4" rx="2" fill="#67e8f9"/>
        <rect x="166" y="202" width="40" height="4" rx="2" fill="#a5b4fc"/>
        <rect x="212" y="202" width="34" height="4" rx="2" fill="#8b5cf6"/>
        <rect x="158" y="214" width="52" height="4" rx="2" fill="#22d3ee"/>
        <rect x="174" y="226" width="80" height="4" rx="2" fill="#67e8f9"/>
        <rect x="166" y="238" width="36" height="4" rx="2" fill="#a855f7"/>
      </g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-86" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>
  <!-- Leher & kaki monitor -->
  <rect x="220" y="176" width="12" height="12" fill="#1b2450"/>
  <rect x="204" y="188" width="44" height="5" rx="2.5" fill="#1b2450"/>

  <!-- ===== Meja ===== -->
  <rect x="30" y="236" width="380" height="8" rx="4" fill="#1b2450"/>
  <rect x="30" y="244" width="380" height="3" fill="#111737"/>

  <!-- ===== Orang (siluet, disinari layar) ===== -->
  <g fill="#070a17">
    <ellipse cx="226" cy="236" rx="46" ry="30" fill="#0a0f22"/>
    <path d="M186,236 q40,-46 80,0 Z" fill="#0a0f22"/>
    <circle cx="226" cy="196" r="17"/>
    <path d="M188,236 q38,-40 76,0 Z"/>
    <!-- rim light -->
    <circle cx="226" cy="196" r="17" fill="none" stroke="#67e8f9" stroke-opacity="0.5" stroke-width="1"/>
    <path d="M188,236 q38,-40 76,0" fill="none" stroke="#8b5cf6" stroke-opacity="0.45" stroke-width="1"/>
  </g>

  <!-- ===== Kopi + uap ===== -->
  <g>
    <rect x="78" y="222" width="20" height="14" rx="2" fill="#a5b4fc"/>
    <path d="M98,225 q8,0 8,5 t-8,5" fill="none" stroke="#a5b4fc" stroke-width="2"/>
    <path d="M85,220 q-3,-6 0,-11 q3,-5 0,-10" fill="none" stroke="#67e8f9" stroke-opacity="0.6" stroke-width="1.6">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="2.8s" repeatCount="indefinite"/>
    </path>
    <path d="M92,220 q3,-6 0,-11 q-3,-5 0,-10" fill="none" stroke="#67e8f9" stroke-opacity="0.5" stroke-width="1.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ===== Tanaman ===== -->
  <g>
    <path d="M348,236 h20 l-2,-14 h-16 z" fill="#6366f1"/>
    <path d="M358,222 q-10,-14 -2,-26" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M358,222 q10,-12 4,-24" fill="none" stroke="#8b5cf6" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M358,222 q0,-16 0,-28" fill="none" stroke="#a855f7" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- Caption -->
  <text x="226" y="278" text-anchor="middle" font-size="12" fill="#6d75a6">// coding after midnight ☕</text>
</svg>

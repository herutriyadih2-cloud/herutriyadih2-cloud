<svg width="440" height="320" viewBox="0 0 440 320" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="term" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1226"/>
      <stop offset="100%" stop-color="#060312"/>
    </linearGradient>
    <filter id="tglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Jendela terminal -->
  <rect x="2" y="2" width="436" height="316" rx="14" fill="url(#term)" stroke="#6366f1" stroke-opacity="0.4"/>
  <!-- Header bar -->
  <path d="M2,16 A14,14 0 0 1 16,2 H424 A14,14 0 0 1 438,16 V44 H2 Z" fill="#121734"/>
  <circle cx="24" cy="23" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="23" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="23" r="6" fill="#27c93f"/>
  <text x="220" y="28" text-anchor="middle" font-size="13" fill="#6d75a6">bash — heru@dev</text>

  <!-- Baris terminal (muncul berurutan) -->
  <g font-size="15.5" filter="url(#tglow)">
    <text x="20" y="78" fill="#e0e7ff"><tspan fill="#22d3ee">heru@dev:~$</tspan> whoami
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.02;0.05;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="108" fill="#a5b4fc">Heru Triyadi — Frontend Developer
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.12;0.15;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="138" fill="#e0e7ff"><tspan fill="#22d3ee">heru@dev:~$</tspan> cat stack.txt
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.24;0.27;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="168" fill="#a5b4fc">Vue.js · Nuxt · TypeScript · Tailwind
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.36;0.39;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="198" fill="#e0e7ff"><tspan fill="#22d3ee">heru@dev:~$</tspan> cat focus.txt
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.48;0.51;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="228" fill="#a5b4fc">UI/UX · SEO · AI &amp; Automation
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.60;0.63;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="258" fill="#e0e7ff"><tspan fill="#22d3ee">heru@dev:~$</tspan> hire --status
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.72;0.75;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="288" fill="#67e8f9" font-weight="700">● Available for work ✔
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.84;0.87;1" dur="9s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Kursor berkedip -->
  <rect x="252" y="277" width="9" height="16" fill="#67e8f9">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>

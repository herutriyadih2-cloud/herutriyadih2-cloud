<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="'Segoe UI', Arial, sans-serif">
  <!-- ============ DEFINISI ============ -->
  <defs>
    <!-- Latar gelap portofolio (#0a0b0b -> #0f172a) -->
    <radialGradient id="bg" cx="72%" cy="42%" r="85%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#050608"/>
    </radialGradient>
    <!-- Aksen cyan -> biru -->
    <linearGradient id="cyanblue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#2563eb" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="globeDisk" cx="40%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#0b1a2b"/>
      <stop offset="100%" stop-color="#04070d"/>
    </radialGradient>
    <!-- Neon glow -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Grid halus -->
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#22d3ee" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <!-- Orbit path untuk satelit -->
    <path id="orbit" d="M805,165 a170,54 0 1,0 340,0 a170,54 0 1,0 -340,0"/>
    <!-- Clip untuk efek mengetik subtitle -->
    <clipPath id="typeClip">
      <rect x="58" y="196" width="0" height="34">
        <animate attributeName="width" values="0;0;372;372;372;0" keyTimes="0;0.05;0.45;0.9;0.97;1" dur="6s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- ============ LATAR ============ -->
  <rect width="1200" height="330" fill="url(#bg)"/>
  <rect width="1200" height="330" fill="url(#grid)"/>

  <!-- Kolom kode "hacker" (biner jatuh) di latar -->
  <g font-family="'Courier New', monospace" font-size="13" fill="#22d3ee">
    <text x="120" y="0" opacity="0.10">1<tspan x="120" dy="16">0</tspan><tspan x="120" dy="16">1</tspan><tspan x="120" dy="16">1</tspan><tspan x="120" dy="16">0</tspan><tspan x="120" dy="16">0</tspan><tspan x="120" dy="16">1</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,-40;0,360" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="360" y="0" opacity="0.08">0<tspan x="360" dy="16">1</tspan><tspan x="360" dy="16">0</tspan><tspan x="360" dy="16">1</tspan><tspan x="360" dy="16">1</tspan><tspan x="360" dy="16">0</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,-30;0,360" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="640" y="0" opacity="0.07">1<tspan x="640" dy="16">1</tspan><tspan x="640" dy="16">0</tspan><tspan x="640" dy="16">0</tspan><tspan x="640" dy="16">1</tspan><tspan x="640" dy="16">0</tspan><tspan x="640" dy="16">1</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,-60;0,360" dur="8s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- ============ GLOBE DIGITAL BERPUTAR ============ -->
  <g transform="translate(975,165)">
    <!-- Atmosfer glow -->
    <circle r="150" fill="url(#globeGlow)"/>
    <!-- Piringan bola -->
    <circle r="115" fill="url(#globeDisk)"/>

    <!-- Orbit satelit -->
    <g transform="rotate(20)">
      <use href="#orbit" transform="translate(-975,-165)" fill="none" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1.2" stroke-dasharray="3 7"/>
      <circle r="4" fill="#67e8f9" filter="url(#glow)">
        <animateMotion dur="9s" repeatCount="indefinite" rotate="auto">
          <mpath href="#orbit"/>
        </animateMotion>
      </circle>
      <animateTransform attributeName="transform" type="rotate" values="20;380" dur="60s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Rangka bola (miring -20°) -->
    <g transform="rotate(-20)" stroke="url(#cyanblue)" fill="none" filter="url(#glow)">
      <!-- Garis lintang -->
      <ellipse cx="0" cy="-100" rx="56.8" ry="18" stroke-opacity="0.35" stroke-width="1"/>
      <ellipse cx="0" cy="-68"  rx="92.7" ry="30" stroke-opacity="0.45" stroke-width="1"/>
      <ellipse cx="0" cy="-35"  rx="109.5" ry="35" stroke-opacity="0.55" stroke-width="1"/>
      <ellipse cx="0" cy="0"    rx="115" ry="37" stroke="#22d3ee" stroke-opacity="0.8" stroke-width="1.3"/>
      <ellipse cx="0" cy="35"   rx="109.5" ry="35" stroke-opacity="0.55" stroke-width="1"/>
      <ellipse cx="0" cy="68"   rx="92.7" ry="30" stroke-opacity="0.45" stroke-width="1"/>
      <ellipse cx="0" cy="100"  rx="56.8" ry="18" stroke-opacity="0.35" stroke-width="1"/>

      <!-- Meridian menyapu (ilusi rotasi) -->
      <ellipse cx="0" cy="0" rx="115" ry="115" stroke-opacity="0.5" stroke-width="1">
        <animate attributeName="rx" values="115;2;115" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite" begin="0s"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="115" ry="115" stroke-opacity="0.5" stroke-width="1">
        <animate attributeName="rx" values="115;2;115" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite" begin="-1.17s"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="115" ry="115" stroke-opacity="0.5" stroke-width="1">
        <animate attributeName="rx" values="115;2;115" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite" begin="-2.33s"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="115" ry="115" stroke-opacity="0.5" stroke-width="1">
        <animate attributeName="rx" values="115;2;115" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite" begin="-3.5s"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="115" ry="115" stroke-opacity="0.5" stroke-width="1">
        <animate attributeName="rx" values="115;2;115" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite" begin="-4.67s"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="115" ry="115" stroke-opacity="0.5" stroke-width="1">
        <animate attributeName="rx" values="115;2;115" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite" begin="-5.83s"/>
      </ellipse>

      <!-- Sumbu kutub -->
      <line x1="0" y1="-115" x2="0" y2="115" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1"/>

      <!-- Node data berkedip di permukaan -->
      <g fill="#67e8f9" stroke="none">
        <circle cx="-40" cy="-35" r="2.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></circle>
        <circle cx="45" cy="0" r="2.4"><animate attributeName="opacity" values="1;0.2;1" dur="3.1s" repeatCount="indefinite"/></circle>
        <circle cx="10" cy="60" r="2.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
        <circle cx="-60" cy="35" r="2.4"><animate attributeName="opacity" values="1;0.3;1" dur="3.6s" repeatCount="indefinite"/></circle>
        <circle cx="30" cy="-60" r="2.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- Cincin luar -->
    <circle r="115" fill="none" stroke="#22d3ee" stroke-opacity="0.55" stroke-width="1.4" filter="url(#glow)"/>
  </g>

  <!-- Arc jaringan data dari teks ke globe -->
  <g fill="none" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1">
    <path id="link1" d="M470,150 Q700,60 855,140"/>
    <path id="link2" d="M470,205 Q690,270 862,200"/>
  </g>
  <circle r="3" fill="#67e8f9" filter="url(#glow)"><animateMotion dur="4.5s" repeatCount="indefinite"><mpath href="#link1"/></animateMotion></circle>
  <circle r="3" fill="#67e8f9" filter="url(#glow)"><animateMotion dur="5.5s" repeatCount="indefinite"><mpath href="#link2"/></animateMotion></circle>

  <!-- ============ TEKS KIRI ============ -->
  <!-- Prompt terminal -->
  <text x="60" y="72" font-family="'Courier New', monospace" font-size="16" fill="#22d3ee" opacity="0.9">root@heru:~$ ./launch --profile
    <tspan fill="#67e8f9">_</tspan>
    <animate attributeName="opacity" values="0.9;0.9" dur="1s"/>
  </text>
  <rect x="352" y="60" width="9" height="16" fill="#67e8f9">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Judul + glitch -->
  <g filter="url(#softglow)">
    <text x="58" y="150" font-size="62" font-weight="800" fill="#ff2e97" opacity="0.0">HERU TRIYADI
      <animate attributeName="opacity" values="0;0.55;0;0;0.4;0" keyTimes="0;0.02;0.05;0.5;0.53;1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x" values="58;54;58" keyTimes="0;0.03;0.06" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="58" y="150" font-size="62" font-weight="800" fill="#22d3ee" opacity="0.0">HERU TRIYADI
      <animate attributeName="opacity" values="0;0.5;0;0;0.35;0" keyTimes="0;0.02;0.05;0.5;0.53;1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x" values="58;62;58" keyTimes="0;0.03;0.06" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="58" y="150" font-size="62" font-weight="800" fill="url(#cyanblue)" letter-spacing="1">HERU TRIYADI</text>
  </g>

  <!-- Subtitle mengetik -->
  <g clip-path="url(#typeClip)">
    <text x="60" y="221" font-family="'Courier New', monospace" font-size="22" font-weight="600" fill="#e2f7ff">Frontend Developer • Vue.js • UI/UX</text>
  </g>

  <!-- Pills keahlian -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#22d3ee">
    <g transform="translate(60,250)">
      <rect width="86" height="26" rx="13" fill="none" stroke="#22d3ee" stroke-opacity="0.6"/>
      <text x="43" y="17" text-anchor="middle">VUE.JS</text>
    </g>
    <g transform="translate(156,250)">
      <rect width="74" height="26" rx="13" fill="none" stroke="#22d3ee" stroke-opacity="0.6"/>
      <text x="37" y="17" text-anchor="middle">UI/UX</text>
    </g>
    <g transform="translate(240,250)">
      <rect width="62" height="26" rx="13" fill="none" stroke="#22d3ee" stroke-opacity="0.6"/>
      <text x="31" y="17" text-anchor="middle">SEO</text>
    </g>
    <g transform="translate(312,250)">
      <rect width="130" height="26" rx="13" fill="none" stroke="#22d3ee" stroke-opacity="0.6"/>
      <text x="65" y="17" text-anchor="middle">AI &amp; AUTOMATION</text>
    </g>
  </g>

  <!-- Garis scan CRT menyapu -->
  <rect x="0" width="1200" height="2" fill="#22d3ee" opacity="0.06">
    <animate attributeName="y" values="0;330;0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Bingkai neon -->
  <rect x="1.5" y="1.5" width="1197" height="327" rx="14" fill="none" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="1.5"/>
</svg>

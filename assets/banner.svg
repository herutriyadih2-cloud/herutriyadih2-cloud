<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="'Segoe UI', Arial, sans-serif">
  <!-- ============ DEFINISI ============ -->
  <defs>
    <!-- Latar luar angkasa (near-black kemerahan) -->
    <radialGradient id="bg" cx="72%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#140408"/>
      <stop offset="55%" stop-color="#0a0204"/>
      <stop offset="100%" stop-color="#030101"/>
    </radialGradient>
    <!-- Nebula merah samar di sekitar globe -->
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2b4a" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#7f1d1d" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Aksen merah neon -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8095"/>
      <stop offset="55%" stop-color="#ff2b4a"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2b4a" stop-opacity="0.30"/>
      <stop offset="45%" stop-color="#b91c1c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="globeDisk" cx="40%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#1a0609"/>
      <stop offset="100%" stop-color="#070203"/>
    </radialGradient>
    <!-- Ekor meteor (searah lokal 0,0 -> 120,-60) -->
    <linearGradient id="meteorTail" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="120" y2="-60">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="16%" stop-color="#ff8095"/>
      <stop offset="55%" stop-color="#ff2b4a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff2b4a" stop-opacity="0"/>
    </linearGradient>
    <!-- Neon glow -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="orbit" d="M805,165 a170,54 0 1,0 340,0 a170,54 0 1,0 -340,0"/>
    <clipPath id="typeClip">
      <rect x="58" y="196" width="0" height="34">
        <animate attributeName="width" values="0;0;372;372;372;0" keyTimes="0;0.05;0.45;0.9;0.97;1" dur="6s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- ============ LUAR ANGKASA ============ -->
  <rect width="1200" height="330" fill="url(#bg)"/>
  <ellipse cx="975" cy="165" rx="330" ry="230" fill="url(#nebula)"/>

  <!-- Bintang berkelip -->
  <g fill="#ffe9ec">
    <circle cx="60" cy="40" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="90" r="0.8"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="210" cy="30" r="1.4" fill="#ff8095"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="95" cy="150" r="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="30" cy="210" r="1.2"><animate attributeName="opacity" values="1;0.2;1" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="175" cy="200" r="0.7"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="270" r="1.3" fill="#ff8095"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="120" r="0.9"><animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="60" r="1.0"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="230" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="40" r="0.8"><animate attributeName="opacity" values="1;0.2;1" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="100" r="1.4" fill="#ff5c6e"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.0s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="280" r="0.9"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="60" r="1.0"><animate attributeName="opacity" values="1;0.3;1" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="180" r="0.8"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="300" r="1.1"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="90" r="1.3" fill="#ff8095"><animate attributeName="opacity" values="1;0.2;1" dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="230" r="0.9"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="40" r="1.0"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="290" r="1.2"><animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="70" r="0.8"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="890" cy="300" r="1.1"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="40" r="1.0"><animate attributeName="opacity" values="1;0.2;1" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="120" r="1.4" fill="#ff5c6e"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.0s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="220" r="0.9"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="280" r="1.1"><animate attributeName="opacity" values="1;0.3;1" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1170" cy="300" r="0.8"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="30" r="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ============ METEOR JATUH ============ -->
  <g stroke-linecap="round">
    <g opacity="0">
      <line x1="0" y1="0" x2="120" y2="-60" stroke="url(#meteorTail)" stroke-width="2.4"/>
      <circle cx="0" cy="0" r="2.6" fill="#ffffff" filter="url(#glow)"/>
      <animateTransform attributeName="transform" type="translate" values="1160,-40;760,160" dur="2.4s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.8;1" dur="2.4s" begin="0s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <line x1="0" y1="0" x2="90" y2="-45" stroke="url(#meteorTail)" stroke-width="1.8"/>
      <circle cx="0" cy="0" r="2.0" fill="#ffffff" filter="url(#glow)"/>
      <animateTransform attributeName="transform" type="translate" values="1000,-50;660,120" dur="3.1s" begin="1.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.8;1" dur="3.1s" begin="1.3s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <line x1="0" y1="0" x2="130" y2="-65" stroke="url(#meteorTail)" stroke-width="2.6"/>
      <circle cx="0" cy="0" r="2.8" fill="#ffffff" filter="url(#glow)"/>
      <animateTransform attributeName="transform" type="translate" values="1190,50;820,240" dur="2.7s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.8;1" dur="2.7s" begin="0.6s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <line x1="0" y1="0" x2="100" y2="-50" stroke="url(#meteorTail)" stroke-width="2.0"/>
      <circle cx="0" cy="0" r="2.2" fill="#ffffff" filter="url(#glow)"/>
      <animateTransform attributeName="transform" type="translate" values="1090,-45;720,120" dur="3.6s" begin="2.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.8;1" dur="3.6s" begin="2.1s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- ============ GLOBE DIGITAL BERPUTAR (merah) ============ -->
  <g transform="translate(975,165)">
    <circle r="150" fill="url(#globeGlow)"/>
    <circle r="115" fill="url(#globeDisk)"/>

    <!-- Orbit satelit -->
    <g transform="rotate(20)">
      <use href="#orbit" transform="translate(-975,-165)" fill="none" stroke="#ff2b4a" stroke-opacity="0.35" stroke-width="1.2" stroke-dasharray="3 7"/>
      <circle r="4" fill="#ff8095" filter="url(#glow)">
        <animateMotion dur="9s" repeatCount="indefinite" rotate="auto">
          <mpath href="#orbit"/>
        </animateMotion>
      </circle>
      <animateTransform attributeName="transform" type="rotate" values="20;380" dur="60s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Rangka bola (miring -20°) -->
    <g transform="rotate(-20)" stroke="url(#accent)" fill="none" filter="url(#glow)">
      <ellipse cx="0" cy="-100" rx="56.8" ry="18" stroke-opacity="0.35" stroke-width="1"/>
      <ellipse cx="0" cy="-68"  rx="92.7" ry="30" stroke-opacity="0.45" stroke-width="1"/>
      <ellipse cx="0" cy="-35"  rx="109.5" ry="35" stroke-opacity="0.55" stroke-width="1"/>
      <ellipse cx="0" cy="0"    rx="115" ry="37" stroke="#ff2b4a" stroke-opacity="0.85" stroke-width="1.3"/>
      <ellipse cx="0" cy="35"   rx="109.5" ry="35" stroke-opacity="0.55" stroke-width="1"/>
      <ellipse cx="0" cy="68"   rx="92.7" ry="30" stroke-opacity="0.45" stroke-width="1"/>
      <ellipse cx="0" cy="100"  rx="56.8" ry="18" stroke-opacity="0.35" stroke-width="1"/>

      <ellipse cx="0" cy="0" rx="115" ry="115" stroke-opacity="0.5" stroke-width="1"><animate attributeName="rx" values="115;2;115" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite" begin="0s"/></ellipse>
      <ellipse cx="0" cy="0" rx="115" ry="115" stroke-opacity="0.5" stroke-width="1"><animate attributeName="rx" values="115;2;115" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite" begin="-1.17s"/></ellipse>
      <ellipse cx="0" cy="0" rx="115" ry="115" stroke-opacity="0.5" stroke-width="1"><animate attributeName="rx" values="115;2;115" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite" begin="-2.33s"/></ellipse>
      <ellipse cx="0" cy="0" rx="115" ry="115" stroke-opacity="0.5" stroke-width="1"><animate attributeName="rx" values="115;2;115" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite" begin="-3.5s"/></ellipse>
      <ellipse cx="0" cy="0" rx="115" ry="115" stroke-opacity="0.5" stroke-width="1"><animate attributeName="rx" values="115;2;115" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite" begin="-4.67s"/></ellipse>
      <ellipse cx="0" cy="0" rx="115" ry="115" stroke-opacity="0.5" stroke-width="1"><animate attributeName="rx" values="115;2;115" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite" begin="-5.83s"/></ellipse>

      <line x1="0" y1="-115" x2="0" y2="115" stroke="#b91c1c" stroke-opacity="0.45" stroke-width="1"/>

      <g fill="#ff8095" stroke="none">
        <circle cx="-40" cy="-35" r="2.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></circle>
        <circle cx="45" cy="0" r="2.4"><animate attributeName="opacity" values="1;0.2;1" dur="3.1s" repeatCount="indefinite"/></circle>
        <circle cx="10" cy="60" r="2.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
        <circle cx="-60" cy="35" r="2.4"><animate attributeName="opacity" values="1;0.3;1" dur="3.6s" repeatCount="indefinite"/></circle>
        <circle cx="30" cy="-60" r="2.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <circle r="115" fill="none" stroke="#ff2b4a" stroke-opacity="0.55" stroke-width="1.4" filter="url(#glow)"/>
  </g>

  <!-- ============ TEKS KIRI ============ -->
  <text x="60" y="72" font-family="'Courier New', monospace" font-size="16" fill="#ff2b4a" opacity="0.9">root@heru:~$ ./launch --profile</text>
  <rect x="352" y="60" width="9" height="16" fill="#ff8095">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <g filter="url(#softglow)">
    <text x="58" y="150" font-size="62" font-weight="800" fill="#ff8095" opacity="0.0">HERU TRIYADI
      <animate attributeName="opacity" values="0;0.55;0;0;0.4;0" keyTimes="0;0.02;0.05;0.5;0.53;1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x" values="58;54;58" keyTimes="0;0.03;0.06" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="58" y="150" font-size="62" font-weight="800" fill="#b91c1c" opacity="0.0">HERU TRIYADI
      <animate attributeName="opacity" values="0;0.5;0;0;0.35;0" keyTimes="0;0.02;0.05;0.5;0.53;1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x" values="58;62;58" keyTimes="0;0.03;0.06" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="58" y="150" font-size="62" font-weight="800" fill="url(#accent)" letter-spacing="1">HERU TRIYADI</text>
  </g>

  <g clip-path="url(#typeClip)">
    <text x="60" y="221" font-family="'Courier New', monospace" font-size="22" font-weight="600" fill="#ffe0e4">Frontend Developer • Vue.js • UI/UX</text>
  </g>

  <g font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#ff2b4a">
    <g transform="translate(60,250)"><rect width="86" height="26" rx="13" fill="none" stroke="#ff2b4a" stroke-opacity="0.6"/><text x="43" y="17" text-anchor="middle">VUE.JS</text></g>
    <g transform="translate(156,250)"><rect width="74" height="26" rx="13" fill="none" stroke="#ff2b4a" stroke-opacity="0.6"/><text x="37" y="17" text-anchor="middle">UI/UX</text></g>
    <g transform="translate(240,250)"><rect width="62" height="26" rx="13" fill="none" stroke="#ff2b4a" stroke-opacity="0.6"/><text x="31" y="17" text-anchor="middle">SEO</text></g>
    <g transform="translate(312,250)"><rect width="130" height="26" rx="13" fill="none" stroke="#ff2b4a" stroke-opacity="0.6"/><text x="65" y="17" text-anchor="middle">AI &amp; AUTOMATION</text></g>
  </g>

  <rect x="0" width="1200" height="2" fill="#ff2b4a" opacity="0.06">
    <animate attributeName="y" values="0;330;0" dur="6s" repeatCount="indefinite"/>
  </rect>
  <rect x="1.5" y="1.5" width="1197" height="327" rx="14" fill="none" stroke="#ff2b4a" stroke-opacity="0.18" stroke-width="1.5"/>
</svg>
